# Code Generated by Sidekick is for learning and experimentation purposes only.
server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Cloud Gateway Configuration
  cloud:
    gateway:
      httpclient:
        max-initial-line-length: 16384
        max-header-size: 65536

      routes:
        # Health Check Route
        - id: health-check
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/health
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 100
                burstCapacity: 200
                requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # User Service Route
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**, /api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 10
                burstCapacity: 20
                requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Transaction Service Route
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 10
                burstCapacity: 20
                requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Notification Service Route
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 10
                burstCapacity: 20
                requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Wallet Service Route
        - id: wallet-service
          uri: ${WALLET_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/wallet/**
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 10
                burstCapacity: 20
                requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # Reward Service Route
        - id: reward-service
          uri: ${REWARD_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/rewards/**
          filters:
            - name: RequestRateLimiter
              args:
                replenishRate: 10
                burstCapacity: 20
                requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    reactor.netty: INFO
