server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  # Standard Spring Boot 3+ Redis Config
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cloud:
    gateway:
      # Required for Spring Boot 3.5.x
      server:
        webflux:
          
          # GLOBAL FILTERS
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - name: RequestSize
              args:
                maxSize: 1048576

          # SERVICE ROUTES
          routes:
            # AUTH / USER SERVICE
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/auth/**, /api/users/**

            # TRANSACTION SERVICE
            - id: transaction-service
              uri: ${TRANSACTION_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/transactions/**
              filters:
                - name: RequestRateLimiter
                  args:
                    replenishRate: 10
                    burstCapacity: 20
                    requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

            # WALLET SERVICE
            - id: wallet-service
              uri: ${WALLET_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/api/v1/wallets/**
              filters:
                - name: RequestRateLimiter
                  args:
                    replenishRate: 10
                    burstCapacity: 20
                    requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

            # NOTIFICATION SERVICE
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/notify/**
              filters:
                - name: RequestRateLimiter
                  args:
                    replenishRate: 10
                    burstCapacity: 20
                    requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

            # REWARD SERVICE
            - id: reward-service
              uri: ${REWARD_SERVICE_URL:http://localhost:8089}
              predicates:
                - Path=/api/rewards/**
              filters:
                - name: RequestRateLimiter
                  args:
                    replenishRate: 10
                    burstCapacity: 20
                    requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

      # Global CORS settings
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# Logging for easier debugging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
