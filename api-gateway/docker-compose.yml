# Code Generated by Sidekick is for learning and experimentation purposes only.
version: '3.8'

services:
  
  redis:
    image: redis:7-alpine
    container_name: paypal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - paypal-network
    restart: unless-stopped

  api-gateway:
    image: sandeshs/api-gateway-fintech:main-ef6863c  # ← CHANGE THIS
    container_name: paypal-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USER_SERVICE_URL=http://host.docker.internal:8081
      - TRANSACTION_SERVICE_URL=http://host.docker.internal:8082
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:8084
      - WALLET_SERVICE_URL=http://host.docker.internal:8088
      - REWARD_SERVICE_URL=http://host.docker.internal:8089
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - paypal-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  paypal-network:
    driver: bridge
