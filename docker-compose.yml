services:
  
  redis:
    image: redis:7-alpine
    container_name: paypal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - paypal-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: paypal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shantanu@123
      MYSQL_DATABASE: user_service_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pshantanu@123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paypal-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: paypal-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - paypal-network

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: paypal-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - paypal-network

  wallet-service:
    image: sandeshs/wallet-service-fintech:latest
    container_name: paypal-wallet
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wallet_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: shantanu@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    # HEALTHCHECK REMOVED TO PREVENT FALSE UNHEALTHY STATUS
    networks:
      - paypal-network
    restart: unless-stopped

  user-service:
    image: sandeshs/user-service-fintech:latest
    container_name: paypal-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: shantanu@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WALLET_SERVICE_URL: http://wallet-service:8088
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      wallet-service:
        condition: service_started # Changed from service_healthy
    # HEALTHCHECK REMOVED
    networks:
      - paypal-network
    restart: unless-stopped

  api-gateway:
    image: sandeshs/api-gateway-fintech:latest
    container_name: paypal-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8088
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started # Changed from service_healthy
    # HEALTHCHECK REMOVED
    networks:
      - paypal-network
    restart: unless-stopped

volumes:
  redis-data:
  mysql-data:

networks:
  paypal-network:
    driver: bridge
