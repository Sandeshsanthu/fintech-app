version: "3.8"

services:
  # This is YOUR existing database service. No changes needed.
  db:
    image: postgres:15
    container_name: shared_db # Renamed for clarity
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # This is YOUR existing Node.js backend service. No changes needed.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodejs_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: sh -lc "npx prisma generate && npx prisma db push && npx tsx backend/src/server.ts"

  # --- NEW SERVICES ADDED BELOW ---

  # This is the NEW Python Authentication Microservice
  auth_service:
    build: ./service/auth_service
    container_name: python_auth_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5001"
    depends_on:
      db: # It depends on the SAME database
        condition: service_healthy
    expose:
      - "5001" # Internal port

  # This is the NEW Python User Microservice (stub)
  user_service:
    build: ./service/user_service
    container_name: python_user_service
    restart: unless-stopped
    expose:
      - "5002"

  # This is the NEW Python Payment Microservice (stub)
  payment_service:
    build: ./service/payment_service
    container_name: python_payment_service
    restart: unless-stopped
    expose:
      - "5003"

volumes:
  # Your existing volumes
  db_data:
  node_modules:

