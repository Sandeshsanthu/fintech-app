version: '3.8'

services:
  # MySQL Database for User Service
  user-db:
    image: mysql:8.0
    container_name: paypal-user-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=user_db
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql-user-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paypal-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: paypal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - paypal-network
    restart: unless-stopped

  # User Service (Added)
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: paypal-user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://user-db:3306/user_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - WALLET_SERVICE_URL=http://host.docker.internal:8088
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - paypal-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: sandeshs/api-gateway-fintech:main-8c7675e
    container_name: paypal-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USER_SERVICE_URL=http://user-service:8081
      - TRANSACTION_SERVICE_URL=http://host.docker.internal:8082
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:8084
      - WALLET_SERVICE_URL=http://host.docker.internal:8088
      - REWARD_SERVICE_URL=http://host.docker.internal:8089
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - paypal-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  mysql-user-data:
    driver: local

networks:
  paypal-network:
    driver: bridge
