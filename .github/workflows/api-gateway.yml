name: Build api-gateway

on:
  push:
    branches:
      - main
    paths:
      - 'api-gateway/**' # Only triggers if files in this folder change
  workflow_dispatch:      # Allows you to click "Run workflow" manually

env:
  DOCKER_IMAGE_NAME: api-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway  # Critical: Tells Docker to look inside the subfolder
          file: ./api-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
